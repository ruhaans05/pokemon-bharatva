const keys={}, pressed={};
addEventListener("keydown",e=>{

addEventListener("keyup",e=>{ keys[e.key.toLowerCase()]=false; });
function tapped(k){ return !!pressed[k]; }
const A_KEYS=["z"," "], B_KEYS=["x"], MENU_KEYS=["enter"];
function tapA(){ return A_KEYS.some(tapped); }

//////////////////// AUDIO / INDIAN MUSIC ENGINE ////////////////////
const AC=window.AudioContext||window.webkitAudioContext;
let ac=null, masterGain=null;
function audio(){
  try{
    if(!ac){ ac=new AC(); masterGain=ac.createGain(); masterGain.gain.value=0.5; masterGain.connect(ac.destination); }
    if(ac.state==="suspended") ac.resume();
  }catch(e){}
  return ac;
}
function tone(freq,dur,type,vol,when,slide){
  try{
    const a=audio(); if(!a) return;
    const t=(when||a.currentTime);
    const o=a.createOscillator(), g=a.createGain();
    o.type=type||"triangle"; o.frequency.setValueAtTime(freq,t);
    if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(20,slide),t+dur);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(vol||0.1,t+0.015);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g); g.connect(masterGain);
    o.start(t); o.stop(t+dur+0.05);
  }catch(e){}
}
// sitar-ish pluck: quick attack triangle + faint octave shimmer
function pluck(freq,dur,vol,when){
  tone(freq,dur,"triangle",vol,when);
  tone(freq*2.01,dur*0.6,"sine",vol*0.35,when);
}
function tabla(kind,when){ // kind: "dha"(low) "na"(high tick)
  try{
    const a=audio(); if(!a) return;
    const t=when||a.currentTime;
    if(kind==="dha"){ tone(95,0.16,"sine",0.22,t,55); }
    else{
      const bufLen=0.04*a.sampleRate|0, buf=a.createBuffer(1,bufLen,a.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<bufLen;i++) d[i]=(Math.random()*2-1)*(1-i/bufLen);
      const s=a.createBufferSource(), g=a.createGain(), f=a.createBiquadFilter();
      f.type="highpass"; f.frequency.value=3000;
      g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.05);
      s.buffer=buf; s.connect(f); f.connect(g); g.connect(masterGain); s.start(t);
    }
  }catch(e){}
}

  snow:    {raga:"bhairavi", root:293.7,tempo:0.48, pat:[4,2,0,2, 5,4,2,-1, 7,5,4,2, 1,0,1,-1],tabla:[1,0,0,0, 2,0,0,0]},

const MUSIC={
  on:true, cur:null, step:0, nextT:0, timer:null,
  play(name){
    if(this.cur===name) return;
    this.cur=name; this.step=0;
    if(!this.timer) this.boot();
  },
  boot(){
    this.timer=setInterval(()=>{
      const a=audio(); if(!a||!this.on||!this.cur) return;
      const def=THEME_DEFS[this.cur]; if(!def) return;
      while(this.nextT<a.currentTime+0.25){
        if(this.nextT<a.currentTime) this.nextT=a.currentTime+0.02;
        const scale=RAGAS[def.raga], t=this.nextT, i=this.step;
        // tanpura drone every beat 0 and 8
        if(i%8===0) pluck(def.root/2,def.tempo*3,0.05,t);
        if(i%8===4) pluck(def.root/2*1.5,def.tempo*2.5,0.035,t);
        // melody
        const deg=def.pat[i%def.pat.length];
        if(deg>=0){
          const oct=Math.floor(deg/scale.length), st=scale[deg%scale.length];
          const f=def.root*Math.pow(2,(st+12*oct)/12);
          pluck(f,def.tempo*1.6,0.075,t);
          // meend (slide) accent occasionally
          if(i%16===12) tone(f,def.tempo*1.4,"sine",0.03,t,f*1.12);
        }
        // tabla
        const tb=def.tabla[i%def.tabla.length];
        if(tb===1) tabla("dha",t); else if(tb===2) tabla("na",t);
        this.nextT+=def.tempo; this.step++;
      }
    },120);
  },
  stop(){ this.cur=null; },
  toggle(){ this.on=!this.on; },
};

}

function typeEff(att,defTypes){ let m=1; for(const d of defTypes){ const e=EFF[att][d]; if(e!==undefined) m*=e; } return m; }

// Each species draws from an archetype using its palette. GBA-ish chunky shapes.
function drawMon(g,sp,x,y,size,back,frame){
  const [c1,c2,c3]=sp.c, s=size*sp.sz;
  const bob=Math.sin(frame*0.08)*2*s/40;
  g.save(); g.translate(x,y+bob);
  if(back) g.scale(-1,1);
  g.scale(s/40,s/40); // design in 80x80 box, origin=center bottom-ish
  const F=sp.form;
  function e(cx,cy,rx,ry,col){ g.fillStyle=col; g.beginPath(); g.ellipse(cx,cy,rx,ry,0,0,7); g.fill(); }
  function c(cx,cy,r,col){ e(cx,cy,r,r,col); }
  function tri(ax,ay,bx,by,cx2,cy2,col){ g.fillStyle=col; g.beginPath(); g.moveTo(ax,ay); g.lineTo(bx,by); g.lineTo(cx2,cy2); g.closePath(); g.fill(); }
  function eye(cx,cy){ c(cx,cy,4.5,"#fff"); c(cx+1.5,cy+0.5,2.4,"#1a1a1a"); }
  switch(F){
    case "bird":{
      // tail fan
      for(let i=-2;i<=2;i++){ e(-18+i*2,-34+Math.abs(i)*3,7,16,i%2?c3:c1); c(-18+i*2,-46+Math.abs(i)*3,3.2,c3); }
      e(0,-20,17,20,c1);            // body
      e(4,-16,10,13,c2);            // belly
      c(10,-40,11,c1);              // head
      tri(19,-42,30,-38,19,-35,"#e8a030"); // beak
      eye(13,-42);
      tri(6,-52,10,-62,14,-52,c3);  // crest
      e(-2,-2,6,4,"#e8a030"); e(8,-2,6,4,"#e8a030"); // feet
      e(2,-24,10,6,c3);             // wing
      break;
    }
    case "cat":{
      e(0,-16,20,15,c1);            // body
      e(-16,-10,7,9,c1);            // haunch
      c(14,-32,12,c1);              // head
      e(15,-26,8,5,c2);             // muzzle
      tri(6,-42,9,-52,13,-42,c1); tri(15,-42,19,-52,22,-42,c1); // ears
      eye(17,-34);
      // stripes
      g.fillStyle=c3;
      for(let i=0;i<3;i++) g.fillRect(-12+i*8,-27,3,10);
      g.strokeStyle=c1; g.lineWidth=5; g.lineCap="round";
      g.beginPath(); g.moveTo(-19,-14); g.quadraticCurveTo(-32,-22,-28,-34); g.stroke(); // tail
      e(-10,-2,5,4,c2); e(2,-2,5,4,c2); e(12,-2,5,4,c2); // paws
      c(17,-27,1.4,"#1a1a1a");
      break;
    }
    case "croc":{
      e(-2,-12,22,12,c1);           // body
      e(0,-8,14,7,c2);              // belly
      c(16,-24,10,c1);              // head
      e(28,-22,12,4.5,c1);          // long snout
      c(37,-24,3.5,c3);             // gharial bump
      eye(17,-28);
      // scutes
      g.fillStyle=c3;
      for(let i=0;i<4;i++) tri(-14+i*8,-22,-11+i*8,-28,-8+i*8,-22,c3);
      g.strokeStyle=c1; g.lineWidth=6; g.lineCap="round";
      g.beginPath(); g.moveTo(-22,-10); g.quadraticCurveTo(-34,-8,-38,-16); g.stroke(); // tail
      e(-10,-2,5,3.5,c2); e(6,-2,5,3.5,c2);
      break;
    }
    case "monkey":{
      e(0,-18,14,16,c1);            // body
      e(2,-14,9,10,c2);             // belly
      c(2,-40,11,c1);               // head
      e(2,-37,8,7,c2);              // face
      eye(-1,-39); eye(6,-39);
      c(-9,-42,4,c1); c(13,-42,4,c1); // ears
      g.strokeStyle=c1; g.lineWidth=4.5; g.lineCap="round";
      g.beginPath(); g.moveTo(-13,-16); g.quadraticCurveTo(-28,-26,-22,-44); g.stroke(); // tail
      g.beginPath(); g.moveTo(-10,-24); g.lineTo(-18,-12); g.stroke();
      g.beginPath(); g.moveTo(12,-24); g.lineTo(18,-12); g.stroke();
      e(-6,-2,5,4,c1); e(8,-2,5,4,c1);
      break;
    }
    case "dog":{
      e(0,-15,18,13,c1);
      e(3,-11,11,7,c2);
      c(15,-30,10,c1);
      e(21,-26,7,4.5,c2);           // snout
      c(25,-27,2,"#1a1a1a");
      tri(8,-38,10,-48,15,-37,c1); tri(17,-38,22,-47,23,-36,c1);
      eye(16,-32);
      g.strokeStyle=c1; g.lineWidth=5; g.lineCap="round";
      g.beginPath(); g.moveTo(-17,-16); g.quadraticCurveTo(-26,-28,-20,-34); g.stroke();
      e(-10,-2,4.5,4,c1); e(0,-2,4.5,4,c1); e(10,-2,4.5,4,c1);
      break;
    }
    case "snake":{
      g.strokeStyle=c1; g.lineWidth=11; g.lineCap="round";
      g.beginPath(); g.moveTo(-24,-4); g.quadraticCurveTo(-6,-14,2,-6); g.quadraticCurveTo(10,2,14,-14); g.stroke();
      e(14,-30,10,14,c1);           // raised hood
      e(14,-30,6,10,c2);
      c(14,-42,8,c1);               // head
      eye(17,-43);
      g.fillStyle=c3; c(14,-30,3,c3); // hood mark
      tri(20,-44,27,-42,20,-40,"#c04838"); // tongue
      break;
    }
    case "elephant":{
      e(0,-18,22,17,c1);            // body
      c(14,-34,13,c1);              // head
      e(2,-34,8,10,c1); e(26,-34,8,10,c1); // ears
      g.strokeStyle=c1; g.lineWidth=7; g.lineCap="round";
      g.beginPath(); g.moveTo(22,-30); g.quadraticCurveTo(30,-18,26,-8); g.stroke(); // trunk
      eye(12,-36);
      g.fillStyle=c3; e(14,-44,9,3,c3); // painted headpiece
      e(-12,-3,6,5,c2); e(0,-3,6,5,c2); e(12,-3,6,5,c2);
      c(20,-26,2.5,"#f0f0e8");      // tusk hint
      break;
    }
    case "fish":{
      e(0,-20,18,11,c1);
      e(4,-18,10,6,c2);
      tri(-16,-20,-30,-30,-30,-10,c1); // tail
      tri(0,-30,6,-40,12,-30,c3);   // dorsal
      eye(11,-22);
      e(2,-12,6,3,c3);              // fin
      // ripples
      g.strokeStyle="rgba(120,170,220,.5)"; g.lineWidth=2;
      g.beginPath(); g.ellipse(0,-2,20,4,0,0,7); g.stroke();
      break;
    }
    case "crab":{
      e(0,-14,17,12,c1);
      e(0,-11,11,7,c2);
      eye(-5,-22); eye(5,-22);
      g.strokeStyle=c1; g.lineWidth=4;
      for(let i=0;i<3;i++){
        g.beginPath(); g.moveTo(-14,-14+i*4); g.lineTo(-24,-8+i*5); g.stroke();
        g.beginPath(); g.moveTo(14,-14+i*4); g.lineTo(24,-8+i*5); g.stroke();
      }
      c(-20,-24,6,c1); c(20,-24,6,c1); // claws
      tri(-24,-27,-16,-24,-24,-20,c2); tri(24,-27,16,-24,24,-20,c2);
      break;
    }
    case "plant":{
      e(0,-10,13,8,c2);             // pad/pot
      g.strokeStyle=c2; g.lineWidth=4; g.beginPath(); g.moveTo(0,-12); g.lineTo(0,-26); g.stroke();
      for(let i=0;i<6;i++){ const a=i*Math.PI/3+0.5; e(Math.cos(a)*10,-32+Math.sin(a)*7,7,4.5,c1); } // petals/leaves
      c(0,-32,7,c3);                // center
      eye(-3,-32); eye(3,-32);
      e(-11,-8,6,3,c1); e(11,-8,6,3,c1);
      break;
    }
    case "tree":{
      g.fillStyle=c2; g.fillRect(-5,-26,10,24); // trunk
      g.strokeStyle=c2; g.lineWidth=3;
      g.beginPath(); g.moveTo(-8,-20); g.lineTo(-8,-2); g.stroke(); // hanging roots
      g.beginPath(); g.moveTo(9,-16); g.lineTo(9,-2); g.stroke();
      c(0,-40,17,c1); c(-13,-34,11,c1); c(13,-34,11,c1); // canopy
      eye(-5,-30); eye(5,-30);
      g.fillStyle=c3; e(0,-24,5,3,c3); // mouth-ish knot
      break;
    }
    case "mouse":{
      e(0,-14,14,12,c1);
      e(2,-11,9,7,c2);
      c(8,-28,9,c1);
      c(1,-36,4.5,c1); c(15,-36,4.5,c1); // ears
      eye(10,-29);
      g.fillStyle=c3; g.fillRect(-9,-22,3,10); g.fillRect(-3,-24,3,12); // stripes
      g.strokeStyle=c1; g.lineWidth=3.5; g.lineCap="round";
      g.beginPath(); g.moveTo(-13,-10); g.quadraticCurveTo(-24,-14,-22,-26); g.stroke();
      break;
    }
    case "machine":{ // auto-rickshaw spirit
      e(0,-16,19,14,c1);            // cab
      g.fillStyle=c2; g.fillRect(-14,-30,28,9); // canopy
      e(-2,-18,9,7,"#c8e8f0");      // windshield
      eye(-4,-18); eye(3,-18);
      c(-12,-4,6,"#2a2a2a"); c(12,-4,6,"#2a2a2a"); c(-12,-4,2.5,c3); c(12,-4,2.5,c3); // wheels
      c(17,-24,3,"#f8e050");        // headlamp
      g.strokeStyle=c3; g.lineWidth=2.5; g.beginPath(); g.moveTo(0,-30); g.lineTo(0,-38); g.stroke(); c(0,-39,2.5,c3); // antenna spark
      break;
    }
    case "fairy":{
      e(0,-18,11,14,c1);            // flowing dress
      tri(-11,-6,11,-6,0,-24,c1);
      c(0,-36,9,c2);                // head
      eye(-3,-36); eye(3,-36);
      g.fillStyle=c3; e(0,-45,7,3,c3); // headdress
      g.strokeStyle=c2; g.lineWidth=3.5; g.lineCap="round";
      g.beginPath(); g.moveTo(-9,-24); g.quadraticCurveTo(-20,-30,-16,-38); g.stroke(); // mudra arms
      g.beginPath(); g.moveTo(9,-24); g.quadraticCurveTo(20,-30,16,-38); g.stroke();
      c(-16,-39,3,c3); c(16,-39,3,c3);
      break;
    }
    case "fighter":{
      e(0,-22,15,17,c1);            // torso
      e(0,-16,10,9,c2);
      c(0,-44,10,c2);               // head
      eye(-3,-44); eye(4,-44);
      g.fillStyle=c3; e(0,-52,9,3.5,c3); // headband/pagdi
      g.strokeStyle=c2; g.lineWidth=6; g.lineCap="round";
      g.beginPath(); g.moveTo(-13,-30); g.lineTo(-22,-40); g.stroke(); // raised arms
      g.beginPath(); g.moveTo(13,-30); g.lineTo(22,-40); g.stroke();
      c(-23,-41,4.5,c2); c(23,-41,4.5,c2);
      g.fillStyle=c3; g.fillRect(-13,-10,10,9); g.fillRect(3,-10,10,9); // shorts/legs
      e(-8,-1,6,3.5,c2); e(8,-1,6,3.5,c2);
      break;
    }
    case "golem":{
      e(0,-16,17,14,c1);            // boulder body
      c(0,-34,11,c1);
      eye(-4,-34); eye(4,-34);
      g.fillStyle=c3;
      g.fillRect(-12,-20,7,5); g.fillRect(5,-14,8,5); g.fillRect(-4,-10,7,4); // carvings
      e(-16,-22,6,8,c2); e(16,-22,6,8,c2); // arms
      e(-9,-2,7,4,c2); e(9,-2,7,4,c2);
      g.fillStyle=c2; e(0,-44,7,2.5,c2); // carved crown
      break;
    }
    case "bear":{
      e(0,-18,20,17,c1);
      e(2,-13,12,9,c2);
      c(12,-36,11,c1);
      e(18,-32,7,4.5,c2);
      c(22,-33,2,"#1a1a1a");
      c(5,-45,4.5,c1); c(17,-46,4.5,c1);
      eye(13,-38);
      g.fillStyle=c3; e(2,-24,7,4,c3); // chest V mark
      e(-11,-2,6,5,c1); e(1,-2,6,5,c1); e(12,-2,6,5,c1);
      break;
    }
    case "weasel":{
      e(0,-13,17,10,c1);
      e(3,-10,10,6,c2);
      c(14,-26,8.5,c1);
      tri(9,-33,11,-40,14,-32,c1); tri(16,-33,20,-40,21,-32,c1);
      eye(16,-28);
      g.strokeStyle=c1; g.lineWidth=5; g.lineCap="round";
      g.beginPath(); g.moveTo(-16,-12); g.quadraticCurveTo(-30,-16,-28,-28); g.stroke();
      e(-8,-2,4.5,3.5,c2); e(6,-2,4.5,3.5,c2);
      break;
    }
    case "fox":{
      e(0,-14,16,11,c1);
      e(3,-10,9,6,c2);
      c(13,-28,9,c1);
      tri(5,-34,7,-48,12,-33,c1); tri(15,-34,21,-48,22,-33,c1); // huge ears
      tri(6,-46,7,-42,11,-42,c2); tri(19,-46,17,-42,21,-42,c2);
      eye(15,-29);
      e(19,-25,5,3,c2); c(23,-26,1.6,"#1a1a1a");
      g.strokeStyle=c1; g.lineWidth=6; g.lineCap="round";
      g.beginPath(); g.moveTo(-15,-12); g.quadraticCurveTo(-28,-14,-27,-24); g.stroke();
      c(-28,-25,4.5,c2);
      break;
    }
    case "bug":{
      e(0,-12,15,10,c1);            // abdomen
      e(11,-18,9,7,c1);             // thorax
      c(18,-26,7,c1);               // head
      eye(20,-28);
      g.strokeStyle=c3; g.lineWidth=3;
      for(let i=0;i<3;i++){ g.beginPath(); g.moveTo(-4+i*8,-10); g.lineTo(-8+i*8,-1); g.stroke(); }
      g.fillStyle=c2; e(-2,-14,9,5,c2); // shell pattern
      // scorpion tail
      g.strokeStyle=c1; g.lineWidth=4.5; g.lineCap="round";
      g.beginPath(); g.moveTo(-14,-14); g.quadraticCurveTo(-24,-26,-16,-34); g.stroke();
      c(-15,-35,3.5,c3);
      g.beginPath(); g.moveTo(22,-32); g.lineTo(26,-38); g.stroke(); // antenna
      break;
    }
    case "moth":{
      e(-10,-26,12,8,c1); e(10,-26,12,8,c1);   // upper wings
      e(-8,-16,9,6,c2); e(8,-16,9,6,c2);       // lower wings
      e(0,-20,5,12,c3);             // body
      c(0,-33,5,c3);
      eye(-2,-34); eye(2,-34);
      c(-8,-26,3,c2); c(8,-26,3,c2); // wing spots
      g.strokeStyle=c3; g.lineWidth=2;
      g.beginPath(); g.moveTo(-2,-38); g.lineTo(-6,-44); g.stroke();
      g.beginPath(); g.moveTo(2,-38); g.lineTo(6,-44); g.stroke();
      break;
    }
    case "ghost":{
      g.globalAlpha=0.92;
      e(0,-22,14,17,c1);            // wisp body
      // wavy bottom
      for(let i=-2;i<=2;i++) c(i*6,-7+Math.abs(i)*2,4.5,c1);
      e(0,-26,8,9,c2);              // inner glow
      eye(-4,-26); eye(4,-26);

      tri(-3,-42,0,-52,3,-42,c3);
      g.globalAlpha=1;
      break;
    }
    case "cloud":{
      g.globalAlpha=0.95;
      c(-10,-20,12,c1); c(4,-26,14,c1); c(14,-16,11,c1); c(-2,-12,12,c1);
      c(2,-22,8,c2);

      g.globalAlpha=1;
      break;
    }
    default: { e(0,-18,16,14,c1); e(2,-14,10,9,c2); eye(-4,-22); eye(5,-22); }
  }
  g.restore();
}

  post:["...I did not foresee that. Wonderful."]},
 {name:"Elite Ispat",type:"Steel",team:[[56,49],[55,49],[35,50],[57,51]],money:10000,
  pre:["Ispat. I built bridges before I built teams. Both must bear weight.","Let's test your load-bearing capacity."],
  post:["Structurally sound. Pass."]},
 {name:"Elite Naaganya",type:"Dragon",team:[[19,50],[8,51],[65,52],[65,53]],money:11000,
  pre:["The old serpents of this land answer to me. Naaganya.","One door remains after mine. Earn it."],
  post:["The serpents bow. The door opens."]},
];
const CHAMPION={name:"Champion Kiran",money:20000,
  pre:["...You made it. Of course you made it.","From Prof. Neem's lab to the roof of the world — I watched you the whole way.","One last battle. Not rivals. Legends."],
  post:["...I always knew, somewhere on Route 1, that it would be you.","CONGRATULATIONS, CHAMPION OF BHARATVA!"]};
</script>
<script>
"use strict";
//////////////////// GAME STATE ////////////////////
const WALK=new Set([".",":",",","_","S","i","d","~","G","B","E"]);
const DOORS=new Set(["C","m","Y","D"]);
// normalize map rows (defensive: pad/trim to declared width)
for(const id in MAPS){ const m=MAPS[id];
  m.rows=m.rows.map(r=>{ r=String(r); const fill=(id==="dhuanworks"||id==="victoryroad"||id==="himgufa"||id==="meghdoot")?"#":"T";
    return r.length<m.w ? r+fill.repeat(m.w-r.length) : r.slice(0,m.w); });
}
function tileOf(m,x,y){ if(x<0||y<0||x>=m.w||y>=m.h) return "T"; return m.rows[y][x]; }
const G={
  scene:"title",       // title|intro|world|dialog|battle|menu|starter|fade
  map:null, px:5, py:5, dir:0,   // dir 0=down 1=up 2=left 3=right
  moving:0, mx:0, my:0,          // animation progress + move delta
  party:[], box:[], bag:{"Poké Ball":5,"Potion":2}, money:3000,
  badges:[false,false,false,false,false,false,false,false],
  flags:{}, beaten:{},           // trainer ids beaten
  lastHeal:{map:"nariyalpur",x:8,y:8},
  steps:0, repel:0, name:"AVANI", rivalName:"KIRAN", explorer:false,
  starterId:null, dexSeen:new Set(), dexCaught:new Set(),
};
const DIRV=[[0,1],[0,-1],[-1,0],[1,0]];
//////////////////// MON INSTANCES ////////////////////
function statCalc(base,lvl,isHp){ return isHp? Math.floor(base*2*lvl/100)+lvl+10 : Math.floor(base*2*lvl/100)+5; }
function makeMon(id,lvl){
  const sp=DEX[id];
  const mv=sp.mv.filter(m=>m[0]<=lvl).slice(-4).map(m=>m[1]);
  const mon={id,lvl,xp:lvl*lvl*lvl,moves:mv,status:null,stages:{atk:0,def:0,spd:0},
    hp:0,maxhp:0,nick:sp.n};
  recalcStats(mon); mon.hp=mon.maxhp;
  return mon;
}
function recalcStats(m){
  const b=DEX[m.id].bs;
  const old=m.maxhp;
  m.maxhp=statCalc(b[0],m.lvl,true);
  m.atk=statCalc(b[1],m.lvl); m.def=statCalc(b[2],m.lvl);
  m.spd=statCalc(b[3],m.lvl); m.spc=statCalc(b[4],m.lvl);
  if(old) m.hp=Math.min(m.maxhp,m.hp+(m.maxhp-old));
}
function xpForLevel(l){ return l*l*l; }
function healParty(){ G.party.forEach(m=>{m.hp=m.maxhp;m.status=null;}); }
function partyAlive(){ return G.party.some(m=>m.hp>0); }
function firstAlive(){ return G.party.findIndex(m=>m.hp>0); }
//////////////////// SAVE/LOAD ////////////////////
function saveGame(){
  try{
    const data={party:G.party,box:G.box,bag:G.bag,money:G.money,badges:G.badges,flags:G.flags,
      beaten:G.beaten,map:G.map,px:G.px,py:G.py,lastHeal:G.lastHeal,starterId:G.starterId,
      seen:[...G.dexSeen],caught:[...G.dexCaught]};
    localStorage.setItem("bharatva-save",JSON.stringify(data));
    return true;
  }catch(e){ return false; }
}
function loadGame(){
  try{
    const s=localStorage.getItem("bharatva-save"); if(!s) return false;
    const d=JSON.parse(s);
    Object.assign(G,{party:d.party,box:d.box||[],bag:d.bag,money:d.money,badges:d.badges,
      flags:d.flags,beaten:d.beaten,map:d.map,px:d.px,py:d.py,lastHeal:d.lastHeal,starterId:d.starterId});
    G.dexSeen=new Set(d.seen||[]); G.dexCaught=new Set(d.caught||[]);
    G.party.forEach(m=>{ if(!m.stages) m.stages={atk:0,def:0,spd:0}; });
    return true;
  }catch(e){ return false; }
}
function hasSave(){ try{ return !!localStorage.getItem("bharatva-save"); }catch(e){ return false; } }
function autosave(){ if(!G.explorer&&G.flags&&G.flags.starter) saveGame(); }
function saveExplorer(){ try{ localStorage.setItem("bharatva-explorer",JSON.stringify({map:G.map,px:G.px,py:G.py})); }catch(e){} }
function enterExplorer(){
  autosave();
  G.explorer=true; G.party=[]; G.scene="world";
  let pos={map:"nariyalpur",px:10,py:6};
  try{ const d=JSON.parse(localStorage.getItem("bharatva-explorer")||"null"); if(d&&MAPS[d.map]) pos=d; }catch(e){}
  G.map=pos.map; G.px=pos.px; G.py=pos.py;
  MUSIC.play(curMap().music||"town");
  say(["EXPLORER MODE — you are a wandering traveller, not a trainer.",
       "Every road, gate and pass is open. No wild Pokémon will bother you, and nobody will battle you.",
       "Walk the whole of Bharatva! Your real adventure is safely auto-saved — leave any time from the menu."]);
}
function leaveExplorer(){
  saveExplorer();
  G.explorer=false;
  if(loadGame()){ G.scene="world"; MUSIC.play(curMap().music||"town"); say(["Welcome back, trainer. Your adventure resumes right where you left it."]); }
  else{ G.scene="title"; titleSel=0; MUSIC.stop(); }
}
//////////////////// DIALOG SYSTEM ////////////////////
const DLG={pages:[],idx:0,chars:0,cb:null,choice:null,choiceIdx:0,active:false};
function say(pages,cb){
  DLG.pages=Array.isArray(pages)?pages.slice():[pages];
  DLG.idx=0; DLG.chars=0; DLG.cb=cb||null; DLG.choice=null; DLG.active=true;
}
function ask(question,options,cb){
  say([question],()=>{});
  DLG.choice=options; DLG.choiceIdx=0; DLG.cb=cb;
}
function updateDialog(){
  const page=DLG.pages[DLG.idx]||"";
  if(DLG.chars<page.length){ DLG.chars+=2; if(tapA()){DLG.chars=page.length;} return; }
  if(DLG.choice&&DLG.idx===DLG.pages.length-1){
    if(tapped("arrowdown")){DLG.choiceIdx=(DLG.choiceIdx+1)%DLG.choice.length; sfx.sel();}
    if(tapped("arrowup")){DLG.choiceIdx=(DLG.choiceIdx+DLG.choice.length-1)%DLG.choice.length; sfx.sel();}
    if(tapA()){ const cb=DLG.cb,ci=DLG.choiceIdx; DLG.active=false; DLG.choice=null; sfx.ok(); if(cb)cb(ci); }
    if(tapB()){ const cb=DLG.cb; DLG.active=false; DLG.choice=null; sfx.no(); if(cb)cb(-1); }
    return;
  }
  if(tapA()||tapB()){
    if(DLG.idx<DLG.pages.length-1){ DLG.idx++; DLG.chars=0; sfx.sel(); }
    else{ const cb=DLG.cb; DLG.active=false; if(cb)cb(); }
  }
}
function drawTextBox(text,full){
  const bx=12,by=cv.height-118,bw=cv.width-24,bh=106;
  ctx.fillStyle="#f8f4e8"; rr2(bx,by,bw,bh,10); ctx.fill();
  ctx.strokeStyle="#4a4088"; ctx.lineWidth=4; rr2(bx+3,by+3,bw-6,bh-6,8); ctx.stroke();
  ctx.fillStyle="#2a2440"; ctx.font="bold 19px 'Trebuchet MS'"; ctx.textAlign="left";
  wrapText(text,bx+22,by+34,bw-44,26);
  if(full){ ctx.fillStyle="#c05838"; const t=(tick>>4)%2; if(t) { ctx.beginPath(); ctx.moveTo(bx+bw-30,by+bh-22); ctx.lineTo(bx+bw-16,by+bh-22); ctx.lineTo(bx+bw-23,by+bh-12); ctx.fill(); } }
}
function wrapText(text,x,y,maxW,lh){
  const words=String(text).split(" "); let line="",yy=y;
  for(const w of words){
    const test=line?line+" "+w:w;
    if(ctx.measureText(test).width>maxW){ ctx.fillText(line,x,yy); line=w; yy+=lh; }
    else line=test;
  }
  ctx.fillText(line,x,yy);
}
function rr2(x,y,w,h,r){ ctx.beginPath(); ctx.roundRect(x,y,w,h,r); }
//////////////////// FADE / WARP ////////////////////
let fade={t:0,dir:0,cb:null}; // dir 1 = fading out
function fadeTo(cb){ fade={t:0,dir:1,cb}; }
function updateFade(){
  if(fade.dir===1){ fade.t+=0.08; if(fade.t>=1){ fade.t=1; fade.dir=-1; if(fade.cb){const c=fade.cb;fade.cb=null;c();} } }
  else if(fade.dir===-1){ fade.t-=0.08; if(fade.t<=0){ fade.t=0; fade.dir=0; } }
}
function warp(mapId,x,y){
  fadeTo(()=>{ G.map=mapId; G.px=x; G.py=y; G.moving=0;
    const m=MAPS[mapId]; MUSIC.play(m.music||"town");
    if(G.explorer) saveExplorer(); else autosave();
  });
}
//////////////////// OVERWORLD ////////////////////
function curMap(){ return MAPS[G.map]; }
function isWalkable(m,x,y){
  const t=tileOf(m,x,y);
  if(!WALK.has(t)&&!DOORS.has(t)) return false;
  // blocks (story roadblocks act as NPCs standing there)
  for(const b of m.blocks){ const bw=b.w||1,bh=b.h||1;
    if(x>=b.x&&x<b.x+bw&&y>=b.y&&y<b.y+bh&&blockActive(b)) return false; }
  for(const n of m.npcs) if(n.x===x&&n.y===y) return false;
  for(const tr of m.trainers) if(tr.x===x&&tr.y===y) return false;
  if(m.legendary&&!G.flags[m.legendary.flag]&&m.legendary.x===x&&m.legendary.y===y) return false;
  return true;
}
function blockActive(b){
  if(G.explorer) return false;
  if(b.flagNot==="badges8") return !G.badges.every(x=>x);
  if(b.flagNot&&b.flagNot.startsWith("badge")&&b.flagNot.length===6) return !G.badges[+b.flagNot[5]];
  if(b.flagNot) return !G.flags[b.flagNot];
  return true;
}
function updateWorld(){
  if(DLG.active){ updateDialog(); return; }
  if(fade.dir!==0) return;
  if(tapMenu()){ openMenu(); return; }
  if(G.moving>0){
    G.moving-=0.125;
    if(G.moving<=0){
      G.moving=0; G.px+=G.mx; G.py+=G.my; G.steps++;
      onStep();
    }
    return;
  }
  // trainer LoS check
  const m=curMap();
  if(!G.explorer&&canBattle()) for(const tr of m.trainers){
    const tid=G.map+":"+tr.x+","+tr.y;
    if(G.beaten[tid]) continue;
    const [dx,dy]=DIRV[tr.d];
    for(let i=1;i<=tr.los;i++){
      const lx=tr.x+dx*i, ly=tr.y+dy*i;
      if(!WALK.has(tileOf(m,lx,ly))&&!DOORS.has(tileOf(m,lx,ly))) break;
      if(lx===G.px&&ly===G.py){
        startTrainerBattle(tr,tid);
        return;
      }
    }
  }
  // movement input
  let d=-1;
  if(keys["arrowdown"]||keys["s"])d=0; else if(keys["arrowup"]||keys["w"])d=1;
  else if(keys["arrowleft"]||keys["a"])d=2; else if(keys["arrowright"]||keys["d"])d=3;
  if(d>=0){
    G.dir=d;
    const [dx,dy]=DIRV[d], nx=G.px+dx, ny=G.py+dy;
    const t=tileOf(m,nx,ny);
    if(DOORS.has(t)){ enterDoor(t,nx,ny); return; }
    if(isWalkable(m,nx,ny)){ G.moving=1; G.mx=dx; G.my=dy; }
    else if(tapped("arrow"+["down","up","left","right"][d])) sfx.bump();
  }
  if(tapA()) interact();
}
function onStep(){
  const m=curMap();
  // exits
  for(const ex of m.exits){
    if(G.px>=ex.x&&G.px<ex.x+(ex.w||1)&&G.py>=ex.y&&G.py<ex.y+(ex.h||1)){
      if(ex.cond&&!G.explorer&&!condMet(ex.cond)){ say(["The way is blocked for now."]); G.px-=G.mx; G.py-=G.my; return; }
      warp(ex.to,ex.tx,ex.ty); return;
    }
  }
  // wild encounter
  if(G.explorer){ if(G.steps%24===0) saveExplorer(); return; }
  if(G.steps%40===0) autosave();
  const t=tileOf(m,G.px,G.py);
  if(t==="G"&&m.wild&&Math.random()<m.wild.rate&&partyAlive()){
    const pool=m.wild.pool, total=pool.reduce((s,p)=>s+p[3],0);
    let r=Math.random()*total, pick=pool[0];
    for(const p of pool){ r-=p[3]; if(r<=0){pick=p;break;} }
    const lvl=pick[1]+Math.floor(Math.random()*(pick[2]-pick[1]+1));
    startWildBattle(makeMon(pick[0],lvl));
  }
}
function condMet(c){
  if(c.startsWith("badge")) return G.badges[+c[5]];
  return !!G.flags[c];
}
function interact(){
  const m=curMap(), [dx,dy]=DIRV[G.dir], fx=G.px+dx, fy=G.py+dy;
  // legendary
  if(m.legendary&&!G.flags[m.legendary.flag]&&m.legendary.x===fx&&m.legendary.y===fy){
    const L=m.legendary;
    if(G.explorer){ say(["A tremendous presence regards you calmly... and lets the traveller pass."]); return; }
    if(!canBattle()){ say(["A tremendous presence watches you... but you have no Pokémon fit to face it."]); return; }
    say(L.text,()=>{ G.flags[L.flag]=true; startWildBattle(makeMon(L.id,L.lvl),true); });
    return;
  }
  // blocks
  for(const b of m.blocks){ const bw=b.w||1,bh=b.h||1;
    if(fx>=b.x&&fx<b.x+bw&&fy>=b.y&&fy<b.y+bh&&blockActive(b)){ say(b.text.map(t=>b.who+": "+t)); return; } }
  // npcs
  for(const n of m.npcs) if(n.x===fx&&n.y===fy){ n.d=[1,0,3,2][G.dir]; say(n.text.map(t=>n.name+": "+t)); return; }
  // trainers (talk = battle if not beaten)
  for(const tr of m.trainers){
    const tid=G.map+":"+tr.x+","+tr.y;
    if(tr.x===fx&&tr.y===fy){
      if(G.explorer) say([tr.name+": Just passing through? The view's good from here. Safe travels!"]);
      else if(G.beaten[tid]) say(tr.post.map(t=>tr.name+": "+t));
      else if(!canBattle()) say([tr.name+": Come back when you have a Pokémon that can battle!"]);
      else startTrainerBattle(tr,tid);
      return;
    }
  }
  // signs
  const sk=fx+","+fy;
  if(m.signs&&m.signs[sk]){ say([m.signs[sk]]); return; }
  const t=tileOf(m,fx,fy);
  if(DOORS.has(t)) enterDoor(t,fx,fy);
}
//////////////////// DOORS: center/mart/gym/story ////////////////////
function enterDoor(t,x,y){
  sfx.door();
  if(G.explorer){
    if(t==="D") return storyDoor();
    say([t==="C"?"Nurse Asha: Just sightseeing? Rest your feet, traveller — the chai is free.":
        t==="m"?"Shopkeeper: No trainer gear for wanderers, but do enjoy the town!":
        "Gym Guide: Gyms are for trainers — but the architecture IS worth admiring."]);
    return;
  }
  if(t==="C"){ // Pokémon Center
    G.lastHeal={map:G.map,x:G.px,y:G.py};
    ask("Nurse Asha: Namaste! Shall I restore your Pokémon to full health?",["Yes please","Also the PC box","Not now"],ci=>{
      if(ci===0){ healParty(); sfx.heal(); say(["Nurse Asha: All healed! We hope to see you again... wait, no—","Nurse Asha: You know what I mean. Safe travels!"]); }
      else if(ci===1){ openBoxMenu(); }
    });
  } else if(t==="m"){ openMart(); }
  else if(t==="Y"){ enterGym(); }
  else if(t==="D"){ storyDoor(); }
}
const MART_STOCK=[["Poké Ball",200],["Great Ball",600],["Ultra Ball",1200],["Potion",300],["Super Potion",700],["Hyper Potion",1500],["Full Heal",600],["Revive",1500]];
function martStockFor(){ // better stock later in game
  const b=G.badges.filter(x=>x).length;
  return MART_STOCK.filter((it,i)=>{
    if(it[0]==="Ultra Ball"&&b<5) return false;
    if(it[0]==="Hyper Potion"&&b<4) return false;
    if(it[0]==="Great Ball"&&b<2) return false;
    if(it[0]==="Revive"&&b<3) return false;
    return true;
  });
}
//////////////////// MENUS (overworld) ////////////////////
const MENU={open:false,stack:[]};
function openMenu(){ MENU.open=true; MENU.stack=[{kind:"main",idx:0}]; sfx.ok(); }
function menuTop(){ return MENU.stack[MENU.stack.length-1]; }
function closeAllMenus(){ MENU.open=false; MENU.stack=[]; }
function openMart(){
  MENU.open=true; MENU.stack=[{kind:"mart",idx:0,stock:martStockFor()}];
}
function openBoxMenu(){
  MENU.open=true; MENU.stack=[{kind:"box",idx:0,mode:"withdraw"}];
}
function updateMenu(){
  if(DLG.active){ updateDialog(); return; }
  const t=menuTop(); if(!t){ closeAllMenus(); return; }
  const move=(n,len)=>{ t.idx=(t.idx+n+len)%len; sfx.sel(); };
  if(t.kind==="main"){
    if(G.explorer){
      const items=["BACK TO ADVENTURE","KEEP EXPLORING"];
      if(tapped("arrowdown"))move(1,items.length); if(tapped("arrowup"))move(-1,items.length);
      if(tapB()||tapMenu()){ closeAllMenus(); return; }
      if(tapA()){ sfx.ok(); closeAllMenus(); if(t.idx===0) leaveExplorer(); }
      return;
    }
    const items=["POKÉMON","BAG","POKÉDEX","BADGES","SAVE","EXPLORER MODE","EXIT"];
    if(tapped("arrowdown"))move(1,items.length); if(tapped("arrowup"))move(-1,items.length);
    if(tapB()||tapMenu()){ closeAllMenus(); return; }
    if(tapA()){
      sfx.ok();
      if(t.idx===0) MENU.stack.push({kind:"party",idx:0,mode:"view"});
      else if(t.idx===1) MENU.stack.push({kind:"bag",idx:0,mode:"world"});
      else if(t.idx===2) MENU.stack.push({kind:"dex",idx:0});
      else if(t.idx===3) MENU.stack.push({kind:"badges"});
      else if(t.idx===4){ const ok=saveGame(); say([ok?"Game saved! (Stored in this browser.)":"Save failed — storage unavailable."]); }
      else if(t.idx===5){
        closeAllMenus();
        ask("Enter EXPLORER MODE? Your adventure auto-saves; the whole map opens for sightseeing (no battles).",["Explore!","Cancel"],ci=>{ if(ci===0) enterExplorer(); });
      }
      else closeAllMenus();
    }
  } else if(t.kind==="party"){
    const len=G.party.length;
    if(len===0){ MENU.stack.pop(); return; }
    if(tapped("arrowdown"))move(1,len); if(tapped("arrowup"))move(-1,len);
    if(tapB()){ MENU.stack.pop(); return; }
    if(tapA()){
      if(t.mode==="view"){
        ask(DEX[G.party[t.idx].id].n+" — what to do?",["Summary","Switch position","Cancel"],ci=>{
          if(ci===0) MENU.stack.push({kind:"summary",mon:G.party[t.idx]});
          else if(ci===1){ t.mode="swap"; t.swapFrom=t.idx; }
        });
      } else if(t.mode==="swap"){
        const a=t.swapFrom,b=t.idx;
        [G.party[a],G.party[b]]=[G.party[b],G.party[a]];
        t.mode="view"; sfx.ok();
      } else if(t.mode==="useitem"){
        useItemOn(t.item,G.party[t.idx],()=>{ MENU.stack.pop(); });
        t.mode="view";
      }
    }
  } else if(t.kind==="summary"){
    if(tapA()||tapB()) MENU.stack.pop();
  } else if(t.kind==="bag"){
    const items=Object.keys(G.bag).filter(k=>G.bag[k]>0);
    if(items.length===0){ if(tapA()||tapB()){MENU.stack.pop();} return; }
    if(t.idx>=items.length)t.idx=items.length-1;
    if(tapped("arrowdown"))move(1,items.length); if(tapped("arrowup"))move(-1,items.length);
    if(tapB()){ MENU.stack.pop(); return; }
    if(tapA()){
      const it=items[t.idx];
      if(it.includes("Ball")){ say(["Better save those for wild battles!"]); return; }
      MENU.stack.push({kind:"party",idx:0,mode:"useitem",item:it});
    }
  } else if(t.kind==="dex"){
    if(tapA()||tapB()) MENU.stack.pop();
  } else if(t.kind==="badges"){
    if(tapA()||tapB()) MENU.stack.pop();
  } else if(t.kind==="mart"){
    const stock=t.stock;
    if(tapped("arrowdown"))move(1,stock.length+1); if(tapped("arrowup"))move(-1,stock.length+1);
    if(tapB()){ closeAllMenus(); return; }
    if(tapA()){
      if(t.idx===stock.length){ closeAllMenus(); return; }
      const [name,price]=stock[t.idx];
      if(G.money<price){ say(["Shopkeeper: Arre, that's "+price+"₹. Come back with more!"]); return; }
      G.money-=price; G.bag[name]=(G.bag[name]||0)+1; sfx.money();
    }
  } else if(t.kind==="box"){
    const list=t.mode==="withdraw"?G.box:G.party;
    const len=list.length+1;
    if(tapped("arrowdown"))move(1,len); if(tapped("arrowup"))move(-1,len);
    if(tapped("arrowleft")||tapped("arrowright")){ t.mode=t.mode==="withdraw"?"deposit":"withdraw"; t.idx=0; sfx.sel(); }
    if(tapB()){ closeAllMenus(); return; }
    if(tapA()){
      if(t.idx===list.length){ closeAllMenus(); return; }
      if(t.mode==="withdraw"){
        if(G.party.length>=6){ say(["Party is full!"]); return; }
        G.party.push(G.box.splice(t.idx,1)[0]); sfx.ok();
      } else {
        if(G.party.length<=1){ say(["You need at least one Pokémon with you!"]); return; }
        G.box.push(G.party.splice(t.idx,1)[0]); sfx.ok();
      }
      if(t.idx>0)t.idx--;
    }
  }
}
function useItemOn(item,mon,done){
  const heals={"Potion":20,"Super Potion":60,"Hyper Potion":120};
  if(heals[item]){
    if(mon.hp<=0){ say([DEX[mon.id].n+" has fainted — a Potion won't help."]); return; }
    if(mon.hp>=mon.maxhp){ say(["HP is already full!"]); return; }
    mon.hp=Math.min(mon.maxhp,mon.hp+heals[item]); G.bag[item]--; sfx.heal();
    say([DEX[mon.id].n+" recovered health!"],done);
  } else if(item==="Full Heal"){
    if(!mon.status){ say(["No status problem to heal!"]); return; }
    mon.status=null; G.bag[item]--; sfx.heal(); say([DEX[mon.id].n+" is refreshed!"],done);
  } else if(item==="Revive"){
    if(mon.hp>0){ say(["It's not fainted!"]); return; }
    mon.hp=Math.floor(mon.maxhp/2); G.bag[item]--; sfx.heal(); say([DEX[mon.id].n+" came back to its senses!"],done);
  }
}
</script>
<script>
"use strict";
//////////////////// BATTLE ENGINE ////////////////////
let BTL=null;
function stageMult(s){ return s>=0?(2+s)/2:2/(2-s); }
function effAtk(m){ let a=m.atk*stageMult(m.stages.atk); if(m.status==="brn")a*=0.5; return a; }
function effDef(m){ return m.def*stageMult(m.stages.def); }
function effSpd(m){ let s=m.spd*stageMult(m.stages.spd); if(m.status==="par")s*=0.25; return s; }
function calcDamage(att,def,mvName){
  const mv=MOVES[mvName], sp=DEX[att.id], spD=DEX[def.id];
  if(mv.cat==="x") return {dmg:0,eff:1,crit:false};
  const A=mv.cat==="p"?effAtk(att):att.spc*stageMult(0);
  const D=mv.cat==="p"?effDef(def):def.spc;
  const stab=sp.t.includes(mv.t)?1.5:1;
  const eff=typeEff(mv.t,spD.t);
  const critChance=mv.crit?0.125:0.0625;
  const crit=Math.random()<critChance;
  let dmg=((2*att.lvl/5+2)*mv.pow*(A/Math.max(1,D)))/50+2;
  dmg*=stab*eff*(crit?1.5:1)*(0.85+Math.random()*0.15);
  return {dmg:Math.max(1,Math.floor(dmg)),eff,crit};
}
function pickAIMove(mon,target){
  const usable=mon.moves.filter(m=>MOVES[m]);
  if(!usable.length) return "Tackle";
  // prefer effective damaging moves
  let best=null,bestScore=-1;
  for(const m of usable){
    const mv=MOVES[m];
    let score=Math.random()*20;
    if(mv.cat!=="x"){ score+=mv.pow*typeEff(mv.t,DEX[target.id].t)*(DEX[mon.id].t.includes(mv.t)?1.4:1)/2; }
    else score+=15*Math.random();
    if(score>bestScore){bestScore=score;best=m;}
  }
  return best;
}
function canBattle(){ return G.party.length>0&&G.party.some(m=>m.hp>0); }
function startWildBattle(foe,isLegend){
  if(!canBattle()) return;
  G.dexSeen.add(foe.id);
  BTL={kind:"wild",foe,foeParty:[foe],foeIdx:0,myIdx:firstAlive(),
    trainer:null,legend:!!isLegend,ui:{mode:"script"},anim:0,shakeFoe:0,shakeMe:0,ballAnim:null,
    partTicks:0,doneCb:null};
  beginBattle();
}
function startTrainerBattle(tr,tid,doneCb,music){
  if(!canBattle()){ say(["You have no Pokémon that can fight!"]); return; }
  const foeParty=tr.team.map(([id,lvl])=>makeMon(id,lvl));
  foeParty.forEach(f=>G.dexSeen.add(f.id));
  BTL={kind:"trainer",tr,tid,foeParty,foeIdx:0,foe:foeParty[0],myIdx:firstAlive(),
    ui:{mode:"script"},anim:0,shakeFoe:0,shakeMe:0,ballAnim:null,doneCb:doneCb||null,musicOverride:music};
  beginBattle();
}
function beginBattle(){
  G.scene="battle";
  MUSIC.play(BTL.musicOverride||(BTL.kind==="wild"?(BTL.legend?"league":"battle"):"battle"));
  BTL.gen=battleScript();
  BTL.wait=null; BTL.waitData=null;
  stepBattle();
}
function stepBattle(arg){
  const r=BTL.gen.next(arg);
  if(r.done){ return; }
  BTL.wait=r.value;
  if(r.value.t==="text"){ BTL.textFull=false; BTL.textChars=0; }
  if(r.value.t==="anim"){ BTL.animT=r.value.dur||24; }
}
function me(){ return G.party[BTL.myIdx]; }
function*battleScript(){
  const B=BTL;
  if(B.kind==="wild") yield txt(B.legend?("A legendary presence — "+DEX[B.foe.id].n+"!"):("Wild "+DEX[B.foe.id].n+" appeared!"));
  else{
    for(const line of (B.tr.pre||[])) yield txt(B.tr.name+": "+line);
    yield txt(B.tr.name+" sent out "+DEX[B.foe.id].n+"!");
  }
  yield txt("Go, "+DEX[me().id].n+"!");
  // main loop
  while(true){
    // --- player command ---
    const cmd=yield {t:"cmd"};
    let myAction=cmd, foeMove=pickAIMove(B.foe,me());
    // run
    if(cmd.a==="run"){
      if(B.kind!=="wild"){ yield txt("Can't run from a trainer battle!"); continue; }
      const odds=effSpd(me())>=effSpd(B.foe)?1:0.6;
      if(Math.random()<odds){ sfx.run(); yield txt("Got away safely!"); endBattle("ran"); return; }
      yield txt("Couldn't escape!");
      yield* foeTurn(foeMove);
      if(yield* checkMyFaint()) return; 
      yield* endOfTurn(); if(yield* checkAllFaints()) return;
      continue;
    }
    // bag
    if(cmd.a==="item"){
      const item=cmd.item;
      if(item.includes("Ball")){
        if(B.kind!=="wild"){ yield txt("You can't catch a trainer's Pokémon!"); continue; }
        G.bag[item]--;
        yield* throwBall(item);
        if(B.caught){ endBattle("caught"); return; }
      } else {
        const mon=cmd.mon||me();
        const heals={"Potion":20,"Super Potion":60,"Hyper Potion":120};
        if(heals[item]){ mon.hp=Math.min(mon.maxhp,mon.hp+heals[item]); G.bag[item]--; sfx.heal(); yield txt(DEX[mon.id].n+"'s HP was restored!"); }
        else if(item==="Full Heal"){ mon.status=null; G.bag[item]--; sfx.heal(); yield txt(DEX[mon.id].n+" was cured!"); }
        else if(item==="Revive"&&mon.hp<=0){ mon.hp=Math.floor(mon.maxhp/2); G.bag[item]--; sfx.heal(); yield txt(DEX[mon.id].n+" was revived!"); }
      }
      yield* foeTurn(foeMove);
      if(yield* checkMyFaint()) return;
      yield* endOfTurn(); if(yield* checkAllFaints()) return;
      continue;
    }
    // switch
    if(cmd.a==="switch"){
      yield txt(DEX[me().id].n+", come back!");
      B.myIdx=cmd.idx;
      yield txt("Go, "+DEX[me().id].n+"!");
      yield* foeTurn(foeMove);
      if(yield* checkMyFaint()) return;
      yield* endOfTurn(); if(yield* checkAllFaints()) return;
      continue;
    }
    // fight — speed order
    const myMove=cmd.move;
    const myPri=MOVES[myMove].pri||0, foePri=MOVES[foeMove].pri||0;
    const meFirst=myPri>foePri||(myPri===foePri&&(effSpd(me())>effSpd(B.foe)||(effSpd(me())===effSpd(B.foe)&&Math.random()<0.5)));
    if(meFirst){
      const foeBefore=B.foeIdx;
      yield* myTurn(myMove);
      if(yield* checkFoeFaint()) return;
      if(B.foeIdx===foeBefore&&B.foe.hp>0){
        yield* foeTurn(foeMove);
        if(yield* checkMyFaint()) return;
      }
    } else {
      const meBefore=B.myIdx;
      yield* foeTurn(foeMove);
      if(yield* checkMyFaint()) return;
      if(B.myIdx===meBefore&&me().hp>0){
        yield* myTurn(myMove);
        if(yield* checkFoeFaint()) return;
      }
    }
    yield* endOfTurn();
    if(yield* checkAllFaints()) return;
  }
}
function txt(s){ return {t:"text",s}; }
function*statusBlocks(mon,label){
  if(mon.status==="par"&&Math.random()<0.25){ yield txt(label+" is paralyzed! It can't move!"); return true; }
  if(mon.status==="slp"){
    mon.slpTurns=(mon.slpTurns||1+Math.floor(Math.random()*3))-1;
    if(mon.slpTurns>0){ yield txt(label+" is fast asleep..."); return true; }
    mon.status=null; yield txt(label+" woke up!");
  }
  if(mon.status==="frz"){
    if(Math.random()<0.2){ mon.status=null; yield txt(label+" thawed out!"); }
    else{ yield txt(label+" is frozen solid!"); return true; }
  }
  return false;
}
function*useMove(att,def,mvName,attLabel,defLabel,isMe){
  const mv=MOVES[mvName];
  yield txt(attLabel+" used "+mvName+"!");
  const acc=mv.acc||999;
  if(Math.random()*100>acc){ yield txt("But it missed!"); return; }
  if(mv.cat==="x"){
    const fx=mv.fx||{};
    if(fx.stage){
      const [who,stat,d]=fx.stage;
      const target=who==="self"?att:def;
      const tl=who==="self"?attLabel:defLabel;
      target.stages[stat]=Math.max(-6,Math.min(6,target.stages[stat]+d));
      yield txt(tl+"'s "+({atk:"Attack",def:"Defense",spd:"Speed",spc:"Sp. power"}[stat])+(d>0?" rose!":" fell!"));
    }
    if(fx.status){
      if(def.status){ yield txt("But it failed!"); }
      else if(fx.status==="brn"&&DEX[def.id].t.includes("Fire")){ yield txt("It doesn't affect "+defLabel+"..."); }
      else if(fx.status==="psn"&&(DEX[def.id].t.includes("Poison")||DEX[def.id].t.includes("Steel"))){ yield txt("It doesn't affect "+defLabel+"..."); }
      else if(fx.status==="par"&&DEX[def.id].t.includes("Electric")){ yield txt("It doesn't affect "+defLabel+"..."); }
      else{ def.status=fx.status; def.slpTurns=0; yield txt(defLabel+statusText(fx.status)); }
    }
    if(fx.heal){ att.hp=Math.min(att.maxhp,att.hp+Math.floor(att.maxhp*fx.heal)); sfx.heal(); yield txt(attLabel+" regained health!"); }
    return;
  }
  const hits=mv.hits||1;
  let totalDealt=0;
  for(let h=0;h<hits;h++){
    if(def.hp<=0) break;
    const {dmg,eff,crit}=calcDamage(att,def,mvName);
    if(eff===0){ yield txt("It doesn't affect "+defLabel+"..."); return; }
    def.hp=Math.max(0,def.hp-dmg); totalDealt+=dmg;
    if(isMe)BTL.shakeFoe=14; else BTL.shakeMe=14;
    if(eff>1)sfx.hitSuper(); else if(eff<1)sfx.hitWeak(); else sfx.hit();
    yield {t:"anim",dur:16};
    if(crit) yield txt("A critical hit!");
    if(eff>1) yield txt("It's super effective!");
    if(eff<1) yield txt("It's not very effective...");
  }
  const fx=mv.fx||{};
  if(fx.status&&def.hp>0&&!def.status&&Math.random()*100<(fx.chance||0)){
    let ok=true;
    if(fx.status==="brn"&&DEX[def.id].t.includes("Fire"))ok=false;
    if(fx.status==="psn"&&(DEX[def.id].t.includes("Poison")||DEX[def.id].t.includes("Steel")))ok=false;
    if(fx.status==="par"&&DEX[def.id].t.includes("Electric"))ok=false;
    if(fx.status==="frz"&&DEX[def.id].t.includes("Ice"))ok=false;
    if(ok){ def.status=fx.status; def.slpTurns=0; yield txt(defLabel+statusText(fx.status)); }
  }
  if(fx.stage&&def.hp>0&&Math.random()*100<(fx.chance||100)){
    const [who,stat,d]=fx.stage;
    const target=who==="self"?att:def, tl=who==="self"?attLabel:defLabel;
    target.stages[stat]=Math.max(-6,Math.min(6,target.stages[stat]+d));
    yield txt(tl+"'s "+({atk:"Attack",def:"Defense",spd:"Speed",spc:"Sp. power"}[stat])+(d>0?" rose!":" fell!"));
  }
  if(fx.drain&&totalDealt>0){ att.hp=Math.min(att.maxhp,att.hp+Math.max(1,Math.floor(totalDealt*fx.drain))); yield txt(attLabel+" drained energy!"); }
  if(fx.recoil&&totalDealt>0){ att.hp=Math.max(0,att.hp-Math.floor(totalDealt*fx.recoil)); yield txt(attLabel+" was hurt by recoil!"); }
}
function statusText(s){ return {par:" is paralyzed!",brn:" was burned!",psn:" was poisoned!",slp:" fell asleep!",frz:" was frozen solid!"}[s]||"!"; }
function*myTurn(mvName){
  const m=me();
  if(yield* statusBlocks(m,DEX[m.id].n)) return;
  yield* useMove(m,BTL.foe,mvName,DEX[m.id].n,"the foe's "+DEX[BTL.foe.id].n,true);
}
function*foeTurn(mvName){
  const f=BTL.foe;
  if(f.hp<=0) return;
  if(yield* statusBlocks(f,"The foe's "+DEX[f.id].n)) return;
  yield* useMove(f,me(),mvName,"The foe's "+DEX[f.id].n,DEX[me().id].n,false);
}
function*endOfTurn(){
  for(const [mon,label] of [[me(),DEX[me().id].n],[BTL.foe,"The foe's "+DEX[BTL.foe.id].n]]){
    if(mon.hp<=0) continue;
    if(mon.status==="psn"||mon.status==="brn"){
      mon.hp=Math.max(0,mon.hp-Math.max(1,Math.floor(mon.maxhp/8)));
      yield txt(label+(mon.status==="psn"?" is hurt by poison!":" is hurt by its burn!"));
    }
  }
}
function*checkFoeFaint(){
  if(BTL.foe.hp>0) return false;
  sfx.faint();
  yield txt("The foe's "+DEX[BTL.foe.id].n+" fainted!");
  // XP
  const gain=Math.floor(DEX[BTL.foe.id].xp*BTL.foe.lvl/7*(BTL.kind==="wild"?1:1.5));
  yield* giveXP(me(),gain);
  // next foe?
  if(BTL.kind!=="wild"&&BTL.foeIdx<BTL.foeParty.length-1){
    BTL.foeIdx++; BTL.foe=BTL.foeParty[BTL.foeIdx];
    yield txt(BTL.tr.name+" sent out "+DEX[BTL.foe.id].n+"!");
    return false;
  }
  // victory
  if(BTL.kind!=="wild"){
    for(const line of (BTL.tr.post||[])) yield txt(BTL.tr.name+": "+line);
    G.money+=BTL.tr.money||0; sfx.money();
    yield txt("You got ₹"+(BTL.tr.money||0)+" for winning!");
    if(BTL.tid) G.beaten[BTL.tid]=true;
  }
  yield* doEvolutions();
  endBattle("win");
  return true;
}
function*checkMyFaint(){
  if(me().hp>0) return false;
  sfx.faint();
  yield txt(DEX[me().id].n+" fainted!");
  const next=G.party.findIndex(m=>m.hp>0);
  if(next<0){
    yield txt("You have no usable Pokémon left!");
    yield txt("You rushed to the nearest Pokémon Center...");
    G.money=Math.floor(G.money/2);
    endBattle("lose");
    return true;
  }
  const pick=yield {t:"pickmon",force:true};
  BTL.myIdx=pick;
  yield txt("Go, "+DEX[me().id].n+"!");
  return false;
}
function*checkAllFaints(){
  if(BTL.foe.hp<=0){ if(yield* checkFoeFaint()) return true; }
  if(me().hp<=0){ if(yield* checkMyFaint()) return true; }
  return false;
}
function*giveXP(mon,gain){
  sfx.xp();
  yield txt(DEX[mon.id].n+" gained "+gain+" EXP!");
  mon.xp+=gain;
  while(mon.lvl<100&&mon.xp>=xpForLevel(mon.lvl+1)){
    mon.lvl++;
    recalcStats(mon); sfx.lvl();
    yield txt(DEX[mon.id].n+" grew to level "+mon.lvl+"!");
    // learn moves
    for(const [l,mv] of DEX[mon.id].mv){
      if(l===mon.lvl&&!mon.moves.includes(mv)){
        if(mon.moves.length<4){ mon.moves.push(mv); yield txt(DEX[mon.id].n+" learned "+mv+"!"); }
        else{
          const ans=yield {t:"yesno",q:DEX[mon.id].n+" wants to learn "+mv+". Forget an old move?"};
          if(ans===0){
            const idx=yield {t:"pickmove",mon,newMove:mv};
            if(idx>=0){ const old=mon.moves[idx]; mon.moves[idx]=mv; yield txt("1, 2 and... poof! "+DEX[mon.id].n+" forgot "+old+" and learned "+mv+"!"); }
            else yield txt(DEX[mon.id].n+" did not learn "+mv+".");
          } else yield txt(DEX[mon.id].n+" did not learn "+mv+".");
        }
      }
    }
    if(DEX[mon.id].evo&&mon.lvl>=DEX[mon.id].evo[0]) mon.pendingEvo=true;
  }
}
function*doEvolutions(){
  for(const mon of G.party){
    if(mon.pendingEvo&&DEX[mon.id].evo){
      const to=DEX[mon.id].evo[1];
      sfx.evolve();
      yield {t:"anim",dur:40};
      yield txt("What? "+DEX[mon.id].n+" is evolving!");
      const oldName=DEX[mon.id].n;
      mon.id=to; mon.pendingEvo=false;
      recalcStats(mon); mon.hp=Math.min(mon.maxhp,mon.hp+10);
      G.dexSeen.add(to); G.dexCaught.add(to);
      yield txt(oldName+" evolved into "+DEX[to].n+"!");
      // learn evo-level moves
      for(const [l,mv] of DEX[to].mv){
        if(l<=mon.lvl&&!mon.moves.includes(mv)&&mon.moves.length<4){ mon.moves.push(mv); yield txt(DEX[to].n+" learned "+mv+"!"); }
      }
    }
  }
}
function*throwBall(item){
  const B=BTL, f=B.foe;
  const ballMult={"Poké Ball":1,"Great Ball":1.5,"Ultra Ball":2}[item]||1;
  yield txt("You threw a "+item+"!");
  const statusB=f.status==="slp"||f.status==="frz"?2:(f.status?1.5:1);
  const a=Math.min(255,(3*f.maxhp-2*f.hp)/(3*f.maxhp)*DEX[f.id].cr*ballMult*statusB);
  const p=Math.min(1,a/255);
  const caughtIt=Math.random()<p;
  const shakes=caughtIt?3:Math.min(2,Math.floor(p*3+Math.random()));
  B.ballAnim={x:0,phase:"fly"};
  sfx.ball();
  yield {t:"anim",dur:24};
  for(let i=0;i<shakes;i++){ sfx.shake(); yield {t:"anim",dur:18}; yield txt("..."+("!".repeat(i+1))); }
  if(caughtIt){
    B.caught=true; sfx.caught();
    yield txt("Gotcha! "+DEX[f.id].n+" was caught!");
    G.dexCaught.add(f.id); G.dexSeen.add(f.id);
    if(G.party.length<6){ G.party.push(f); yield txt(DEX[f.id].n+" joined your party!"); }
    else{ G.box.push(f); yield txt(DEX[f.id].n+" was sent to the PC Box!"); }
  } else {
    B.ballAnim=null;
    yield txt("Oh no! It broke free!");
  }
}
function endBattle(result){
  const B=BTL;
  G.party.forEach(m=>{ m.stages={atk:0,def:0,spd:0}; m.pendingEvo=false; });
  const cb=B.doneCb;
  BTL=null;
  if(result==="lose"){
    healParty();
    G.scene="world";
    warp(G.lastHeal.map,G.lastHeal.x,G.lastHeal.y);
  } else {
    G.scene="world";
    MUSIC.play(curMap().music||"town");
  }
  if(cb) cb(result);
  autosave();
}
//////////////////// BATTLE UI STATE MACHINE ////////////////////
function updateBattle(){
  const B=BTL; if(!B) return;
  if(B.shakeFoe>0)B.shakeFoe--;
  if(B.shakeMe>0)B.shakeMe--;
  const w=B.wait;
  if(!w) return;
  if(w.t==="text"){
    const s=w.s;
    if(B.textChars<s.length){ B.textChars+=2; if(tapA())B.textChars=s.length; return; }
    if(tapA()||tapB()){ stepBattle(); }
  } else if(w.t==="anim"){
    B.animT--; if(B.animT<=0){ if(B.ballAnim&&B.ballAnim.phase==="fly")B.ballAnim.phase="sit"; stepBattle(); }
  } else if(w.t==="cmd"){
    updateBattleMenu();
  } else if(w.t==="pickmon"){
    updateBattleParty(w);
  } else if(w.t==="yesno"){
    if(!B.ynIdx)B.ynIdx=0;
    if(tapped("arrowup")||tapped("arrowdown")){B.ynIdx=1-B.ynIdx;sfx.sel();}
    if(tapA()){const i=B.ynIdx;B.ynIdx=0;sfx.ok();stepBattle(i);}
    if(tapB()){B.ynIdx=0;sfx.no();stepBattle(1);}
  } else if(w.t==="pickmove"){
    if(B.pmIdx===undefined)B.pmIdx=0;
    const len=w.mon.moves.length;
    if(tapped("arrowdown")){B.pmIdx=(B.pmIdx+1)%len;sfx.sel();}
    if(tapped("arrowup")){B.pmIdx=(B.pmIdx+len-1)%len;sfx.sel();}
    if(tapA()){const i=B.pmIdx;B.pmIdx=undefined;sfx.ok();stepBattle(i);}
    if(tapB()){B.pmIdx=undefined;sfx.no();stepBattle(-1);}
  }
}
function updateBattleMenu(){
  const B=BTL;
  if(!B.menu)B.menu={kind:"main",idx:0};
  const m=B.menu;
  if(m.kind==="main"){
    if(tapped("arrowright"))m.idx=m.idx%2===0?m.idx+1:m.idx;
    if(tapped("arrowleft"))m.idx=m.idx%2===1?m.idx-1:m.idx;
    if(tapped("arrowdown"))m.idx=m.idx<2?m.idx+2:m.idx;
    if(tapped("arrowup"))m.idx=m.idx>=2?m.idx-2:m.idx;
    if(tapA()){
      sfx.ok();
      if(m.idx===0){ m.kind="fight"; m.fIdx=0; }
      else if(m.idx===1){ m.kind="bag"; m.bIdx=0; }
      else if(m.idx===2){ m.kind="party"; m.pIdx=0; }
      else{ B.menu=null; stepBattle({a:"run"}); }
    }
  } else if(m.kind==="fight"){
    const mv=me().moves, len=mv.length;
    if(tapped("arrowdown"))m.fIdx=(m.fIdx+1)%len;
    if(tapped("arrowup"))m.fIdx=(m.fIdx+len-1)%len;
    if(tapB()){ m.kind="main"; sfx.no(); return; }
    if(tapA()){ const move=mv[m.fIdx]; B.menu=null; sfx.ok(); stepBattle({a:"fight",move}); }
  } else if(m.kind==="bag"){
    const items=Object.keys(G.bag).filter(k=>G.bag[k]>0);
    if(!items.length){ if(tapA()||tapB()){m.kind="main";} return; }
    if(m.bIdx>=items.length)m.bIdx=items.length-1;
    if(tapped("arrowdown"))m.bIdx=(m.bIdx+1)%items.length;
    if(tapped("arrowup"))m.bIdx=(m.bIdx+items.length-1)%items.length;
    if(tapB()){ m.kind="main"; sfx.no(); return; }
    if(tapA()){
      const item=items[m.bIdx]; sfx.ok();
      if(item==="Revive"||item.includes("Potion")||item==="Full Heal"){ m.kind="party"; m.pIdx=0; m.useItem=item; }
      else{ B.menu=null; stepBattle({a:"item",item}); }
    }
  } else if(m.kind==="party"){
    const len=G.party.length;
    if(tapped("arrowdown"))m.pIdx=(m.pIdx+1)%len;
    if(tapped("arrowup"))m.pIdx=(m.pIdx+len-1)%len;
    if(tapB()){ m.kind="main"; m.useItem=null; sfx.no(); return; }
    if(tapA()){
      const mon=G.party[m.pIdx];
      if(m.useItem){
        const it=m.useItem; m.useItem=null; B.menu=null; sfx.ok();
        stepBattle({a:"item",item:it,mon});
      } else {
        if(m.pIdx===B.myIdx){ sfx.no(); return; }
        if(mon.hp<=0){ sfx.no(); return; }
        const idx=m.pIdx; B.menu=null; sfx.ok();
        stepBattle({a:"switch",idx});
      }
    }
  }
}
function updateBattleParty(w){
  const B=BTL;
  if(B.fpIdx===undefined)B.fpIdx=firstAlive();
  const len=G.party.length;
  if(tapped("arrowdown")){B.fpIdx=(B.fpIdx+1)%len;sfx.sel();}
  if(tapped("arrowup")){B.fpIdx=(B.fpIdx+len-1)%len;sfx.sel();}
  if(tapA()){
    const mon=G.party[B.fpIdx];
    if(mon.hp<=0){sfx.no();return;}
    const i=B.fpIdx; B.fpIdx=undefined; sfx.ok(); stepBattle(i);
  }
}

function camera(){
  const m=curMap();
  let cx=(G.px+ (G.moving>0?G.mx*(1-G.moving):0))*TS+TS/2-cv.width/2;
  let cy=(G.py+ (G.moving>0?G.my*(1-G.moving):0))*TS+TS/2-cv.height/2;
  cx=Math.max(0,Math.min(cx,m.w*TS-cv.width));
  cy=Math.max(0,Math.min(cy,m.h*TS-cv.height));
  if(m.w*TS<cv.width)cx=(m.w*TS-cv.width)/2;
  if(m.h*TS<cv.height)cy=(m.h*TS-cv.height)/2;
  return [cx,cy];
}
function drawTile(t,x,y,p,tx,ty){
  switch(t){
    case ".": case ":": ctx.fillStyle=((tx+ty)%2)?p.gr:p.gr2; ctx.fillRect(x,y,TS,TS); break;
    case ",": case "_": ctx.fillStyle=p.path; ctx.fillRect(x,y,TS,TS);
      ctx.fillStyle="rgba(0,0,0,.06)"; if(t==="_"){ctx.fillRect(x,y+TS/2-2,TS,4);} break;
    case "S": ctx.fillStyle=p.path; ctx.fillRect(x,y,TS,TS);
      ctx.fillStyle="rgba(255,255,255,.15)"; ctx.fillRect(x+8,y+10,4,4); ctx.fillRect(x+30,y+30,4,4); break;
    case "i": ctx.fillStyle=p.gr; ctx.fillRect(x,y,TS,TS);
      ctx.fillStyle="rgba(160,190,220,.3)"; ctx.fillRect(x+((tx*7)%30),y+((ty*11)%30),5,3); break;
    case "d": ctx.fillStyle=p.gr; ctx.fillRect(x,y,TS,TS);
      ctx.fillStyle="rgba(0,0,0,.12)"; ctx.fillRect(x+((tx*13)%28),y+((ty*7)%28),6,4); break;
    case "~": ctx.fillStyle=((tx+ty)%2)?p.gr:p.gr2; ctx.fillRect(x,y,TS,TS);
      ctx.fillStyle=p.flower; ctx.beginPath(); ctx.arc(x+TS/2,y+TS/2,6,0,7); ctx.fill();
      ctx.fillStyle="#f8e050"; ctx.beginPath(); ctx.arc(x+TS/2,y+TS/2,2.5,0,7); ctx.fill(); break;
    case "G": ctx.fillStyle=p.gr2; ctx.fillRect(x,y,TS,TS);
      ctx.fillStyle=p.tall;
      for(let i=0;i<3;i++){ const gx=x+6+i*14, sway=Math.sin(tick*0.05+tx+i)*2;
        ctx.beginPath(); ctx.moveTo(gx,y+TS-4); ctx.quadraticCurveTo(gx+3+sway,y+16,gx+6+sway,y+8);
        ctx.quadraticCurveTo(gx+8+sway,y+16,gx+12,y+TS-4); ctx.fill(); }
      break;
    case "W": { ctx.fillStyle=p.water; ctx.fillRect(x,y,TS,TS);
      ctx.fillStyle="rgba(255,255,255,.25)";
      const w=Math.sin(tick*0.06+tx*1.3+ty*0.7);
      if(w>0.3) ctx.fillRect(x+8,y+14+w*6,22,3);
      break; }
    case "B": ctx.fillStyle="#b8905a"; ctx.fillRect(x,y,TS,TS);
      ctx.fillStyle="#8a6838"; ctx.fillRect(x,y+6,TS,3); ctx.fillRect(x,y+TS-9,TS,3); break;
    case "T": ctx.fillStyle=p.gr2; ctx.fillRect(x,y,TS,TS);
      ctx.fillStyle="#6a4828"; ctx.fillRect(x+TS/2-4,y+26,8,16);
      ctx.fillStyle=p.tree; ctx.beginPath(); ctx.arc(x+TS/2,y+18,15,0,7); ctx.fill();
      ctx.fillStyle=p.treeT; ctx.beginPath(); ctx.arc(x+TS/2-5,y+13,9,0,7); ctx.fill(); break;
    case "p": ctx.fillStyle=p.gr; ctx.fillRect(x,y,TS,TS);
      ctx.strokeStyle="#8a6838"; ctx.lineWidth=5; ctx.beginPath(); ctx.moveTo(x+TS/2,y+TS-4); ctx.quadraticCurveTo(x+TS/2+4,y+22,x+TS/2,y+12); ctx.stroke();
      ctx.strokeStyle=p.tree; ctx.lineWidth=4; ctx.lineCap="round";
      for(let i=0;i<5;i++){ const a=i*1.25-2.5; ctx.beginPath(); ctx.moveTo(x+TS/2,y+12); ctx.quadraticCurveTo(x+TS/2+Math.cos(a)*14,y+6+Math.sin(a)*4,x+TS/2+Math.cos(a)*20,y+12+Math.sin(a)*8); ctx.stroke(); }
      break;
    case "M": case "^": ctx.fillStyle=p.rock; ctx.fillRect(x,y,TS,TS);
      ctx.fillStyle="rgba(255,255,255,.15)"; ctx.beginPath(); ctx.moveTo(x+4,y+TS); ctx.lineTo(x+TS/2,y+8); ctx.lineTo(x+TS-4,y+TS); ctx.fill();
      ctx.fillStyle="rgba(0,0,0,.15)"; ctx.fillRect(x,y+TS-6,TS,6); break;
    case "R": ctx.fillStyle=((tx+ty)%2)?p.gr:p.gr2; ctx.fillRect(x,y,TS,TS);
      ctx.fillStyle=p.rock; ctx.beginPath(); ctx.arc(x+TS/2,y+TS/2+4,14,0,7); ctx.fill();
      ctx.fillStyle="rgba(255,255,255,.2)"; ctx.beginPath(); ctx.arc(x+TS/2-4,y+TS/2,5,0,7); ctx.fill(); break;
    case "s": ctx.fillStyle=p.path; ctx.fillRect(x,y,TS,TS);
      ctx.fillStyle="rgba(0,0,0,.12)"; ctx.beginPath(); ctx.arc(x+TS/2,y+TS/2+6,15,Math.PI,0); ctx.fill(); break;
    case "F": ctx.fillStyle=((tx+ty)%2)?p.gr:p.gr2; ctx.fillRect(x,y,TS,TS);
      ctx.fillStyle=p.fence; ctx.fillRect(x+4,y+14,6,26); ctx.fillRect(x+28,y+14,6,26); ctx.fillRect(x,y+20,TS,6); break;
    case "H": ctx.fillStyle=p.wall; ctx.fillRect(x,y+14,TS,TS-14);
      ctx.fillStyle=p.roof; ctx.fillRect(x-1,y,TS+2,18);
      ctx.fillStyle="rgba(0,0,0,.2)"; ctx.fillRect(x+8,y+26,10,12);
      break;
    case "#": ctx.fillStyle=p.wall; ctx.fillRect(x,y,TS,TS);
      ctx.strokeStyle="rgba(0,0,0,.25)"; ctx.lineWidth=2; ctx.strokeRect(x+2,y+2,TS-4,TS-4); break;
    case "!": ctx.fillStyle=((tx+ty)%2)?p.gr:p.gr2; ctx.fillRect(x,y,TS,TS);
      ctx.fillStyle="#8a6838"; ctx.fillRect(x+TS/2-3,y+22,6,18);
      ctx.fillStyle="#c8a868"; ctx.fillRect(x+8,y+10,TS-16,16);
      ctx.strokeStyle="#6a4818"; ctx.lineWidth=2; ctx.strokeRect(x+8,y+10,TS-16,16); break;
    case "C": case "m": case "Y": case "D": {
      ctx.fillStyle=p.wall; ctx.fillRect(x,y,TS,TS);
      const col=t==="C"?"#e05858":t==="m"?"#4878d8":t==="Y"?"#c8a030":"#5a5468";
      ctx.fillStyle=col; ctx.fillRect(x,y,TS,12);
      ctx.fillStyle="#4a4048"; ctx.fillRect(x+10,y+18,TS-20,TS-18);
      ctx.fillStyle=col;
      if(t==="C"){ ctx.fillRect(x+TS/2-2,y+20,4,12); ctx.fillRect(x+TS/2-6,y+24,12,4); }
      if(t==="m"){ ctx.fillRect(x+TS/2-6,y+22,12,9); }
      if(t==="Y"){ ctx.beginPath(); ctx.arc(x+TS/2,y+27,5,0,7); ctx.fill(); }
      break; }
    case "E": ctx.fillStyle=p.path; ctx.fillRect(x,y,TS,TS); break;
    default: ctx.fillStyle=p.gr; ctx.fillRect(x,y,TS,TS);
  }
}
function drawChar(x,y,dir,walk,palette){
  // GBA-style small character. palette {skin,shirt,pant,hat}
  const P=palette;
  const step=walk?Math.sin(tick*0.35)*3:0;
  ctx.save(); ctx.translate(x+TS/2,y+TS/2+6);
  // feet
  ctx.fillStyle=P.pant;
  ctx.fillRect(-8,8+ (step>0?-2:0),6,8); ctx.fillRect(2,8+(step<0?-2:0),6,8);
  // body
  ctx.fillStyle=P.shirt; ctx.fillRect(-9,-6,18,16);
  // arms
  ctx.fillStyle=P.skin; ctx.fillRect(-12,-2,4,9); ctx.fillRect(8,-2,4,9);
  // head
  ctx.fillStyle=P.skin; ctx.beginPath(); ctx.arc(0,-14,10,0,7); ctx.fill();
  // hair/hat
  ctx.fillStyle=P.hat; ctx.beginPath(); ctx.arc(0,-16,10,Math.PI,0); ctx.fill(); ctx.fillRect(-10,-17,20,4);
  // face by dir
  ctx.fillStyle="#2a2020";
  if(dir===0){ ctx.fillRect(-5,-13,3,4); ctx.fillRect(2,-13,3,4); }
  else if(dir===2){ ctx.fillRect(-7,-13,3,4); }
  else if(dir===3){ ctx.fillRect(4,-13,3,4); }
  ctx.restore();
}
const PLAYER_PAL={skin:"#e8b088",shirt:"#d84838",pant:"#3a4a8a",hat:"#2a2a30"};
function npcPal(name){
  let h=0; for(const c of name) h=(h*31+c.charCodeAt(0))%360;
  return {skin:"#e0a878",shirt:"hsl("+h+",55%,45%)",pant:"#4a4458",hat:"hsl("+((h+120)%360)+",45%,30%)"};
}
function drawWorld(){
  const m=curMap(), p=PAL[m.pal];
  const [cx,cy]=camera();
  ctx.fillStyle="#0a0a14"; ctx.fillRect(0,0,cv.width,cv.height);
  const x1=Math.floor(cx/TS), y1=Math.floor(cy/TS), x2=Math.ceil((cx+cv.width)/TS), y2=Math.ceil((cy+cv.height)/TS);
  for(let ty=y1;ty<=y2;ty++)for(let tx=x1;tx<=x2;tx++){
    drawTile(tileOf(m,tx,ty),tx*TS-cx,ty*TS-cy,p,tx,ty);
  }
  // blocks (guards)
  for(const b of m.blocks) if(blockActive(b)) drawChar((b.gx??b.x)*TS-cx,(b.gy??b.y)*TS-cy,0,false,{skin:"#e0a878",shirt:"#c87828",pant:"#4a4458",hat:"#8a5a28"});
  // npcs
  for(const n of m.npcs) drawChar(n.x*TS-cx,n.y*TS-cy,n.d||0,false,npcPal(n.name));
  // trainers

let titleSel=0;
function updateTitle(){
  const n=hasSave()?3:2;
  if(tapped("arrowdown")){ titleSel=(titleSel+1)%n; sfx.sel(); }
  if(tapped("arrowup")){ titleSel=(titleSel+n-1)%n; sfx.sel(); }
  if(tapA()){
    audio(); sfx.ok();
    const pick=hasSave()?["continue","new","explore"][titleSel]:["new","explore"][titleSel];
    if(pick==="explore"){ enterExplorer(); return; }
    if(pick==="continue"){
      loadGame(); G.explorer=false; G.scene="world"; MUSIC.play(curMap().music||"town");
    } else {
      // fresh state
      G.party=[]; G.box=[]; G.bag={"Poké Ball":5,"Potion":2}; G.money=3000;
      G.badges=[false,false,false,false,false,false,false,false]; G.flags={}; G.beaten={};

      G.dexSeen=new Set(); G.dexCaught=new Set();
      G.explorer=false; G.scene="world"; MUSIC.play("town");
      say(["Welcome to BHARATVA — a region of eleven languages, a hundred festivals and a million Pokémon.",
           "You are a young trainer from Nariyalpur, the coconut village at the region's southern tip.",
           "Prof. Neem's lab is the building with the dark door. She's expecting you!",
           "(Z = talk/confirm · X = cancel · ENTER = menu · walk into red-roof Centers to heal, blue-roof Marts to shop)"]);
    }
  }
}

//////////////////// MAIN LOOP ////////////////////
function update(){
  if(G.scene==="title") updateTitle();
  else if(G.scene==="starter") updateStarter();
  else if(G.scene==="world"){
    updateFade();
    if(MENU.open) updateMenu();
    else updateWorld();
  }
  else if(G.scene==="battle"){ updateBattle(); }
}
function render(){
  if(G.scene==="title"){ drawTitle(); return; }
  if(G.scene==="starter"){ drawStarterScreen(); return; }
  if(G.scene==="battle"){ drawBattle(); return; }
  drawWorld();
  drawMenus();
  if(DLG.active&&!MENU.open){
    const page=DLG.pages[DLG.idx]||"";
    drawTextBox(page.slice(0,DLG.chars),DLG.chars>=page.length);
    if(DLG.choice&&DLG.chars>=page.length&&DLG.idx===DLG.pages.length-1){
      drawPanel(cv.width-250,cv.height-128-DLG.choice.length*36,236,DLG.choice.length*36+24);
      DLG.choice.forEach((o,i)=>{
        ctx.fillStyle=i===DLG.choiceIdx?"#c05838":"#2a2440"; ctx.font="bold 17px 'Trebuchet MS'";
        ctx.fillText((i===DLG.choiceIdx?"▶ ":"  ")+o,cv.width-230,cv.height-100-DLG.choice.length*36+i*36+ (36-8));
      });
    }
  } else if(DLG.active&&MENU.open){
    const page=DLG.pages[DLG.idx]||"";
    drawTextBox(page.slice(0,DLG.chars),DLG.chars>=page.length);
    if(DLG.choice&&DLG.chars>=page.length){
      drawPanel(cv.width-250,cv.height-128-DLG.choice.length*36,236,DLG.choice.length*36+24);
      DLG.choice.forEach((o,i)=>{
        ctx.fillStyle=i===DLG.choiceIdx?"#c05838":"#2a2440"; ctx.font="bold 17px 'Trebuchet MS'";
        ctx.fillText((i===DLG.choiceIdx?"▶ ":"  ")+o,cv.width-230,cv.height-100-DLG.choice.length*36+i*36+28);
      });
    }
  }
  if(fade.dir!==0||fade.t>0){ ctx.fillStyle="rgba(8,6,16,"+fade.t+")"; ctx.fillRect(0,0,cv.width,cv.height); }
}
// hook trainer-battle completion for story flags
const _origStartTrainer=startTrainerBattle;
startTrainerBattle=function(tr,tid,doneCb,music){
  _origStartTrainer(tr,tid,(res)=>{
    if(doneCb)doneCb(res);
    if(res==="win"&&tid) afterBattleHooks(tid);
  },music);
};
let last=0,acc=0;
function loop(t){
  requestAnimationFrame(loop);
  const dt=Math.min(60,t-last); last=t; acc+=dt;
  while(acc>=16.67){ acc-=16.67; tick++; update(); clearTaps(); }
  render();
}
requestAnimationFrame(loop);
</script>
